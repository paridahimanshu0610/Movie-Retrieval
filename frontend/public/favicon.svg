<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Board body -->
  <rect x="8" y="20" width="48" height="36" rx="4" fill="#1a1a2e"/>
  <!-- Clapper top -->
  <rect x="8" y="12" width="48" height="10" rx="3" fill="#e63946"/>
  <!-- Clapper stripes -->
  <polygon points="16,12 24,12 18,22 10,22" fill="#f1faee"/>
  <polygon points="28,12 36,12 30,22 22,22" fill="#f1faee"/>
  <polygon points="40,12 48,12 42,22 34,22" fill="#f1faee"/>
  <!-- Film holes left -->
  <rect x="12" y="28" width="5" height="5" rx="1" fill="#e63946"/>
  <rect x="12" y="38" width="5" height="5" rx="1" fill="#e63946"/>
  <rect x="12" y="48" width="5" height="5" rx="1" fill="#e63946"/>
  <!-- Film holes right -->
  <rect x="47" y="28" width="5" height="5" rx="1" fill="#e63946"/>
  <rect x="47" y="38" width="5" height="5" rx="1" fill="#e63946"/>
  <rect x="47" y="48" width="5" height="5" rx="1" fill="#e63946"/>
  <!-- Screen area -->
  <rect x="22" y="27" width="20" height="28" rx="2" fill="#457b9d" opacity="0.6"/>
  <!-- Play triangle -->
  <polygon points="28,36 28,46 38,41" fill="#f1faee"/>
</svg>
